url: https://farach.github.io/onet2r/
destination: _pkgdown

development:
  mode: release

template:
  bootstrap: 5
  bootswatch: flatly
  bslib:
    primary: "#0f766e"
    secondary: "#334155"
    success: "#14b8a6"
    info: "#0ea5e9"
    bg: "#fbfdfc"
    fg: "#0f172a"
    border-radius: "0.9rem"
    btn-border-radius: "999px"
    base_font:
      google: Inter
    heading_font:
      google: Inter
    code_font:
      google: JetBrains Mono

opengraph:
  image:
    src: man/figures/logo.png
    alt: onet2r hex logo

home:
  title: Work with O*NET Web Services, archives, and weights from R
  description: >
    A tidyverse-first toolkit for current O*NET Web Services data,
    archived O*NET releases, taxonomy crosswalks, user-supplied measures,
    and BLS OEWS or PUMS employment weights.
  links:
    - text: O*NET Web Services API
      href: https://services.onetcenter.org/
    - text: O*NET Database Releases
      href: https://www.onetcenter.org/db_releases.html
    - text: BLS OEWS Data
      href: https://www.bls.gov/oes/tables.htm

navbar:
  bg: primary
  structure:
    left: [intro, articles, reference, news]
    right: [github]
  components:
    intro:
      text: Get Started
      href: articles/getting-started.html
    articles:
      text: Articles
      menu:
        - text: Start Here
        - text: Getting Started
          href: articles/getting-started.html
        - text: Why Longitudinal O*NET Is Hard
          href: articles/longitudinal-onet-background.html
        - text: Historical O*NET Workflows
        - text: Longitudinal Archives
          href: articles/longitudinal-archives.html
        - text: How to Fool Yourself over Time
          href: articles/how-to-fool-yourself-with-onet-over-time.html
        - text: Measures and Weights
        - text: From Tasks to Occupations
          href: articles/from-tasks-to-occupations.html
        - text: Reproducible Measures
          href: articles/measure-reproducibility.html
        - text: Stress-Testing an Exposure Measure
          href: articles/stress-testing-exposure-measure.html
        - text: Choosing Employment Weights
          href: articles/choosing-employment-weights.html
        - text: OEWS Wage Context
          href: articles/oews-wage-context.html
        - text: Change and Validation
        - text: Change Decomposition
          href: articles/within-between-decomposition.html
        - text: Output Validation
          href: articles/output-validation.html
    reference:
      text: Reference
      href: reference/index.html
    news:
      text: News
      href: news/index.html
    github:
      icon: fab fa-github
      href: https://github.com/farach/onet2r
      aria-label: GitHub repository

reference:
  - title: Authentication and request controls
    contents:
      - onet_api_key
      - onet_cache_use
      - onet_cache_clear
      - onet_rate_limit
  - title: Occupation search and summaries
    contents:
      - onet_search
      - onet_occupations
      - onet_occupations_all
      - onet_occupation
      - onet_occupation_details
  - title: Occupation detail endpoints
    contents:
      - onet_skills
      - onet_skills_all
      - onet_knowledge
      - onet_abilities
      - onet_work_styles
      - onet_interests
      - onet_work_context
      - onet_work_context_all
      - onet_work_activities
      - onet_work_activities_all
      - onet_tasks
      - onet_detailed_work_activities
      - onet_related_occupations
      - onet_professional_associations
      - onet_apprenticeship
      - onet_education
      - onet_job_zone
  - title: Technology endpoints
    contents:
      - onet_hot_technology
      - onet_technology
      - onet_technology_skills
      - onet_in_demand_skills
  - title: Database tables
    contents:
      - onet_tables
      - onet_table_info
      - onet_table
  - title: Crosswalks and taxonomy
    contents:
      - onet_crosswalk_military
      - onet_crosswalk_bridge
      - onet_taxonomy_map
  - title: Longitudinal O*NET archives
    contents:
      - onet_releases
      - onet_archive_download
      - onet_archive_read
      - onet_panel
      - onet_panel_reconcile
      - onet_change_summary
  - title: BLS OEWS and PUMS weight panels
    contents:
      - onet_oews
      - onet_oews_national
      - onet_oews_state
      - onet_oews_metro
      - onet_oews_industry
      - onet_reference_soc_resolve
      - onet_weight_panel_oews
      - onet_weight_panel_pums
  - title: Older weighting helpers
    desc: Soft-deprecated helpers retained for compatibility.
    contents:
      - onet_join_oews
      - onet_weighted_summary
      - onet_pums_employment_weights
  - title: Reproducible user measures
    contents:
      - onet_measure
      - onet_measure_coverage
      - onet_coverage
      - onet_provenance
      - onet_task_to_occupation
      - onet_measure_aggregate
      - onet_measure_sensitivity
      - onet_robustness_diagnostic
      - onet_decompose_change

articles:
  - title: Start here
    navbar: ~
    contents:
      - getting-started
      - longitudinal-onet-background
  - title: Historical O*NET workflows
    navbar: ~
    contents:
      - longitudinal-archives
      - how-to-fool-yourself-with-onet-over-time
  - title: Measures and weights
    navbar: ~
    contents:
      - from-tasks-to-occupations
      - measure-reproducibility
      - stress-testing-exposure-measure
      - choosing-employment-weights
      - oews-wage-context
  - title: Change and validation
    navbar: ~
    contents:
      - within-between-decomposition
      - output-validation
