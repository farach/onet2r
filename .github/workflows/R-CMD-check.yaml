on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

name: R-CMD-check

permissions: read-all

jobs:
  R-CMD-check:
    runs-on: ${{ matrix.config.os }}

    name: ${{ matrix.config.os }} (${{ matrix.config.r }})

    strategy:
      fail-fast: false
      matrix:
        config:
          - {os: ubuntu-latest, r: 'release'}
          - {os: macos-latest, r: 'release'}
          - {os: windows-latest, r: 'release'}

    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
      R_KEEP_PKG_SOURCE: yes

    steps:
      - uses: actions/checkout@v4

      - uses: r-lib/actions/setup-r@v2
        with:
          r-version: ${{ matrix.config.r }}
          use-public-rspm: true

      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: any::rcmdcheck
          needs: check

      - uses: r-lib/actions/check-r-package@v2
        with:
          args: 'c("--no-manual", "--as-cran")'
          error-on: '"warning"'

  no-network:
    runs-on: ubuntu-latest

    name: no-network (offline fixture tests)

    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}

    steps:
      - uses: actions/checkout@v4

      - uses: r-lib/actions/setup-r@v2
        with:
          r-version: 'release'
          use-public-rspm: true

      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: any::testthat, any::devtools
          needs: check

      - name: Run resurvey and content-change tests with network black-holed
        env:
          # Route any accidental network call to an unreachable local port so
          # the offline verbs are proven to need no O*NET access. The proxy is
          # scoped to this step only, so dependency install above is unaffected.
          http_proxy: http://127.0.0.1:9
          https_proxy: http://127.0.0.1:9
          HTTP_PROXY: http://127.0.0.1:9
          HTTPS_PROXY: http://127.0.0.1:9
          no_proxy: ''
        run: |
          Rscript -e 'devtools::load_all("."); testthat::test_dir("tests/testthat", filter = "resurvey|content-change", stop_on_failure = TRUE)'

