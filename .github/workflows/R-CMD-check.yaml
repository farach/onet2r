on:
  push:
    branches: [main]
  pull_request:
    branches: [main, farach-harden-release-gates]

name: R-CMD-check

permissions: read-all

jobs:
  R-CMD-check:
    runs-on: ${{ matrix.config.os }}

    name: ${{ matrix.config.os }} (${{ matrix.config.r }})

    strategy:
      fail-fast: false
      matrix:
        config:
          - {os: ubuntu-latest, r: 'release'}
          - {os: macos-latest, r: 'release'}
          - {os: windows-latest, r: 'release'}

    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
      R_KEEP_PKG_SOURCE: yes

    steps:
      - uses: actions/checkout@v4

      - uses: r-lib/actions/setup-r@v2
        with:
          r-version: ${{ matrix.config.r }}
          use-public-rspm: true

      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: any::rcmdcheck
          needs: check

      - uses: r-lib/actions/check-r-package@v2
        with:
          args: 'c("--no-manual", "--as-cran")'
          error-on: '"warning"'

  old-r:
    runs-on: ubuntu-22.04

    name: ubuntu-22.04 (R 4.1 installed tests)

    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
      NOT_CRAN: true
      R_KEEP_PKG_SOURCE: yes

    steps:
      - uses: actions/checkout@v4

      - uses: r-lib/actions/setup-r@v2
        with:
          r-version: '4.1'
          use-public-rspm: true

      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: any::testthat
          needs: check

      - name: Build and install package without vignettes
        run: |
          R CMD build --no-manual --no-build-vignettes .
          package_tarball="$(find . -maxdepth 1 -name 'onet2r_*.tar.gz' -print -quit)"
          test -n "$package_tarball"
          R CMD INSTALL "$package_tarball"

      - name: Run installed-package tests on R 4.1
        run: |
          Rscript -e 'library(onet2r); testthat::test_dir("tests/testthat", package = "onet2r", load_package = "installed", stop_on_failure = TRUE)'

  no-network:
    runs-on: ubuntu-latest

    name: no-network (installed offline fixture tests)

    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}

    steps:
      - uses: actions/checkout@v4

      - uses: r-lib/actions/setup-r@v2
        with:
          r-version: 'release'
          use-public-rspm: true

      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: any::testthat
          needs: check

      - name: Build and install package
        run: |
          R CMD build --no-manual --no-build-vignettes .
          package_tarball="$(find . -maxdepth 1 -name 'onet2r_*.tar.gz' -print -quit)"
          test -n "$package_tarball"
          R CMD INSTALL "$package_tarball"

      - name: Run installed-package fixture tests with network blocked
        env:
          http_proxy: http://127.0.0.1:9
          https_proxy: http://127.0.0.1:9
          no_proxy: ''
        run: |
          Rscript -e 'library(onet2r); testthat::test_dir("tests/testthat", package = "onet2r", load_package = "installed", stop_on_failure = TRUE)'

  clean-install:
    runs-on: ubuntu-latest

    name: clean-install (2 rounds)

    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}

    steps:
      - uses: actions/checkout@v4

      - uses: r-lib/actions/setup-r@v2
        with:
          r-version: 'release'
          use-public-rspm: true

      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          needs: check

      - name: Validate built tarball from temporary libraries
        run: Rscript tools/validate-clean-install.R --rounds=2
